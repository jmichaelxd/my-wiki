<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Server Wiki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,8..144,400..700;1,8..144,400..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="wiki.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body class="wiki-view">
    <div class="shell">
      <aside class="sidebar" aria-label="Wiki navigation">
        <header class="sidebar-head">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true">◇</span>
            <div>
              <h1 class="brand-title" id="view-brand-title">Server Wiki</h1>
              <p class="brand-sub">Read-only</p>
            </div>
          </div>
          <label class="sr-only" for="sidebar-filter">Filter pages</label>
          <input
            type="search"
            id="sidebar-filter"
            class="filter-input"
            placeholder="Filter servers & apps…"
            autocomplete="off"
          />
        </header>
        <nav class="tree" id="nav-tree"></nav>
      </aside>

      <main class="main">
        <header class="main-toolbar view-toolbar">
          <div class="breadcrumb" id="breadcrumb"></div>
        </header>

        <article class="article empty-state" id="article-root">
          <div class="view-site-title-wrap">
            <p class="view-site-title-label">Website</p>
            <p class="view-site-title" id="view-site-title">Server Wiki</p>
          </div>

          <div id="empty-message" class="empty-message">
            <p>Select a server or application from the sidebar.</p>
          </div>

          <div id="view-panel" class="view-panel" hidden>
            <nav class="guide-index" id="guide-index" aria-label="Guide index"></nav>
            <h1 class="view-page-title" id="view-page-title"></h1>
            <div class="view-meta-grid" id="view-meta"></div>
            <div id="view-sections" class="view-sections"></div>
          </div>
        </article>
      </main>
    </div>

    <script src="wiki-view.js" defer></script>
  </body>
</html>
